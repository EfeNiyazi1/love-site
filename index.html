<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beni Seviyor Musun? ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Arka planda yüzen kalpler -->
    <div class="heart-bg" id="heart-bg"></div>

    <div class="container">
        <main class="card" id="love-card">
            <div class="gif-container">
                <img src="ben.jpeg" alt="Ben">
            </div>
            <h1 id="question-text">Beni seviyor musun?</h1>
            <div class="buttons">
                <button id="yes-btn" class="btn btn-yes">Çok seviyorum</button>
                <button id="no-btn" class="btn btn-no">Hiç sevmiyorum</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
